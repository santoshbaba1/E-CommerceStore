version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecommerce-network

  frontend-service:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - user-service
    networks:
      - ecommerce-network

  user-service:
    build: ./backend/user-service
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    networks:
      - ecommerce-network

  product-service:
    build: ./backend/product-service
    ports:
      - "3002:3002"
    networks:
      - ecommerce-network

  cart-service:
    build: ./backend/cart-service
    ports:
      - "3003:3003"
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - ecommerce-network

  order-service:
    build: ./backend/order-service
    ports:
      - "3004:3004"
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mongodb_data:
